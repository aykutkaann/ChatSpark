name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: chatSpark_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: chatspark
          RABBITMQ_DEFAULT_PASS: chatspark_dev
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Apply migrations
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update -p ChatSpark.Infrastructure -s ChatSpark.Api
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=chatSpark_db;Username=postgres;Password=admin"
          ConnectionStrings__Redis: "localhost:6379"
          ConnectionStrings__RabbitMQ: "amqp://chatspark:chatspark_dev@localhost:5672"
          Jwt__Issuer: "ChatSpark"
          Jwt__Audience: "ChatSpark.Api"
          Jwt__SigningKey: "CI_TEST_KEY_at_least_64_characters_long_for_HS256_security_0123456789abcdef"
          Jwt__AccessTokenMinutes: "15"
          Jwt__RefreshTokenDays: "7"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t chatspark-api:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker compose up -d postgres redis rabbitmq
          sleep 15
          docker compose up -d api
          sleep 10
          docker compose ps
          docker compose logs api --tail 20
          docker compose down
